<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Request - KYROS WORLD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1220;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:900px;
background:#111c3a;
padding:40px;
border-radius:20px;
}

h1{
margin-bottom:25px;
}

input, textarea{
width:100%;
padding:16px;
margin-bottom:18px;
border:none;
border-radius:10px;
font-size:16px;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:white;
color:black;
font-weight:bold;
}

#result{
margin-top:20px;
padding:15px;
border-radius:10px;
display:none;
background:#1a284f;
}
</style>

</head>

<body>

<div class="container">

<h1>Service Request</h1>

<input type="text" id="serial" placeholder="Serial Number (KYR-2026-0001)">

<input type="text" id="customerName" placeholder="Customer Name">

<textarea id="issue" placeholder="Describe the issue"></textarea>

<button onclick="submitRequest()">Submit Service Request</button>

<div id="result"></div>

</div>

<script>

async function submitRequest(){

const payload = {
action: "service",
serial: document.getElementById("serial").value.trim(),
customerName: document.getElementById("customerName").value.trim(),
issue: document.getElementById("issue").value.trim()
};

try{

const response = await fetch(
"https://kyros-api.madanchandkhute.workers.dev/",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
}
);

const data = await response.json();

const result = document.getElementById("result");

result.style.display = "block";

if(data.success){

result.innerHTML =
"<strong>✅ Service Request Submitted</strong><br><br>" +
"Ticket Number: " + data.ticketNumber + "<br>" +
"Status: Open";

}else{

result.innerHTML =
"<strong>❌ Request Failed</strong>";

}

}catch(error){

document.getElementById("result").style.display = "block";
document.getElementById("result").innerHTML =
"<strong>❌ Error connecting server</strong>";

}

}

</script>

</body>
</html>
