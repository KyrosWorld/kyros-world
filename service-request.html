<!DOCTYPE html>

<html lang="en">
<head>
<title>Service Request - KYROS WORLD</title>
<link rel="icon" type="image/png" sizes="48x48" href="assets/images/favicon-48x48.png">

<link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon-192x192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Service Request - KYROS WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:
linear-gradient(
to right,
rgba(0,0,0,0.85),
rgba(0,0,0,0.55)
),
url('assets/images/watchmaker.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

color:white;
}

.container{
width:100%;
max-width:900px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

border:1px solid rgba(212,175,55,0.15);
border-radius:25px;

padding:40px;

box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
height:70px;
width:auto;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
font-weight:700;
}

.gold{
color:#d4af37;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
line-height:1.6;
}

input,
textarea{
width:100%;
padding:16px;

background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);

border-radius:12px;

color:white;
font-size:16px;

margin-bottom:18px;
outline:none;
}

input::placeholder,
textarea::placeholder{
color:#9ca3af;
}

input:focus,
textarea:focus{
border-color:#d4af37;
box-shadow:0 0 15px rgba(212,175,55,0.25);
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:16px;

border:none;
border-radius:12px;

background:#d4af37;
color:black;

font-size:16px;
font-weight:700;

cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

#result{
display:none;

margin-top:25px;
padding:25px;

background:rgba(212,175,55,0.05);
border:1px solid rgba(212,175,55,0.20);

border-radius:15px;
line-height:1.8;
}

.back-home{
display:block;
text-align:center;
margin-top:25px;

color:#d4af37;
text-decoration:none;
font-size:18px;
}

.back-home:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="assets/images/logo.png" alt="KYROS WORLD">
</div>

<h1><span class="gold">Service</span> Request</h1>

<p class="subtitle">
Submit a repair or maintenance request for your KYROS WORLD watch
</p>

<input
type="text"
id="serial"
placeholder="Serial Number (KYR-2026-0001)"

>

<input
type="text"
id="customerName"
placeholder="Customer Name"

>

<textarea
id="issue"
placeholder="Describe the issue"
></textarea>

<button onclick="submitRequest()">
Submit Service Request
</button>

<div id="result"></div>

<a href="index.html" class="back-home">
← Back to Home
</a>

</div>

<script>

async function submitRequest(){

const payload = {
action: "service",
serial: document.getElementById("serial").value.trim(),
customerName: document.getElementById("customerName").value.trim(),
issue: document.getElementById("issue").value.trim()
};

try{

const response = await fetch(
"https://kyros-api.madanchandkhute.workers.dev/",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
}
);

const data = await response.json();

const result = document.getElementById("result");

result.style.display = "block";

if(data.success){

result.innerHTML =
"<h3 style='color:#d4af37;'>Request Submitted Successfully</h3>" +
"<br>" +
"<strong>Ticket Number:</strong> " + data.ticketNumber + "<br>" +
"<strong>Status:</strong> Open ✅";

}else{

result.innerHTML =
"<strong>❌ Request Failed</strong>";

}

}catch(error){

document.getElementById("result").style.display = "block";

document.getElementById("result").innerHTML =
"<strong>❌ Error connecting server</strong>";

}

}

</script>

</body>
</html>
