<!DOCTYPE html>
<html lang="en">
<head>
<title>Warranty Check - KYROS WORLD</title>
<link rel="icon" type="image/png" sizes="48x48" href="assets/images/favicon-48x48.png">

<link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon-192x192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warranty Check - KYROS WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:
linear-gradient(
to right,
rgba(0,0,0,0.85),
rgba(0,0,0,0.55)
),
url('assets/images/watchmaker.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

color:white;
}

.container{
width:100%;
max-width:700px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

border:1px solid rgba(212,175,55,0.15);
border-radius:25px;

padding:40px;

box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
height:70px;
width:auto;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
font-weight:700;
}

.gold{
color:#d4af37;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
line-height:1.6;
}

input{
width:100%;
padding:16px;

background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);

border-radius:12px;

color:white;
font-size:16px;
outline:none;
}

input:focus{
border-color:#d4af37;
box-shadow:0 0 15px rgba(212,175,55,0.25);
}
  
button{
width:100%;
margin-top:18px;

padding:16px;

border:none;
border-radius:12px;

background:#d4af37;
color:black;

font-size:16px;
font-weight:700;

cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

.result{
margin-top:25px;
padding:25px;
background:rgba(212,175,55,0.05);
border:1px solid rgba(212,175,55,0.2);
border-radius:15px;
}

.result h3{
color:#d4af37;
margin-bottom:15px;
}

.result p{
margin-bottom:10px;
line-height:1.6;
}

.back-home{
display:block;
text-align:center;
margin-top:25px;

color:#d4af37;
text-decoration:none;
}

.back-home:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="assets/images/logo.png" alt="KYROS WORLD">
</div>

<h1><span class="gold">Warranty</span> Check</h1>

<p class="subtitle">
Verify your KYROS WORLD watch warranty instantly
</p>

<input
id="serial"
type="text"
placeholder="Enter Serial Number (KYR-2026-0001)"
>

<button onclick="checkWarranty()">
Check Warranty
</button>

<div id="result" class="result"></div>

<a href="index.html" class="back-home">
← Back to Home
</a>

</div>

<script>

async function checkWarranty(){

const serial =
document.getElementById("serial").value.trim();

if(!serial){
alert("Please enter serial number");
return;
}

const url =
"https://script.google.com/macros/s/AKfycbxjp8e-tsIpI78Win2i7WL3AhwFYvTKaqX52eTvovFioZAB2JXkL6sAWGfOY8LYkizj/exec?serial="
+ encodeURIComponent(serial);

try{

const response = await fetch(url);
const data = await response.json();

const result =
document.getElementById("result");

if(data.error){

result.style.display="block";

result.innerHTML =
`<h3>Result</h3>
<p><strong>${data.error}</strong></p>`;

return;
}

result.style.display="block";

result.innerHTML = `
<h3>Warranty Details</h3>

<p><strong>Serial:</strong> ${data.serial}</p>

<p><strong>Model:</strong> ${data.model}</p>

<p><strong>Status:</strong> ${data.status}</p>

<p><strong>Customer:</strong> ${data.customerName}</p>

<p><strong>Mobile:</strong> ${data.mobileNumber}</p>

<p><strong>Expiry:</strong> ${new Date(data.expiryDate).toLocaleDateString('en-GB',{
day:'2-digit',
month:'long',
year:'numeric'
})}</p>
`;

}
catch(err){

alert("Error connecting API");

}

}

</script>

</body>
</html>
